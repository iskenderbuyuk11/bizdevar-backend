# api.buykon.com — Nginx reverse proxy (backend serverde)
# Fayl: /etc/nginx/sites-available/api.buykon.com
# Sonra: ln -s ... sites-enabled/ && nginx -t && systemctl reload nginx
#
# DNS: api.buykon.com A record → backend server IP

server {
    listen 80;
    server_name api.buykon.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.buykon.com;

    # SSL sertifikat (Let's Encrypt):
    # certbot --nginx -d api.buykon.com
    ssl_certificate     /etc/letsencrypt/live/api.buykon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buykon.com/privkey.pem;

    client_max_body_size 60M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
