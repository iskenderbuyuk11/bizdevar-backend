# Render.com deploy (pulsuz plan)
# 1) GitHub-a backend qovlugunu push edin
# 2) render.com -> New Web Service -> Docker
# 3) Asagidaki env deyerlerini Environment-a elave edin

services:
  - type: web
    name: bizdevar-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: hosting
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: cmzxbzhgdt_bizdevar
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SQL_INIT_MODE
        value: always
