server:
  port: 8080

spring:
  application:
    name: bizdevar-backend

  # Serverde JAR yaninda application.yml varsa avtomatik oxuyur (/root/application.yml)
  config:
    import: optional:file:./application.yml

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 60MB

  datasource:
    url: jdbc:mysql://localhost:3306/bizdevar?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: false
      encoding: UTF-8

  jackson:
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

bizdevar:
  jwt:
    secret: bizdevar-dev-secret-change-in-production-please-use-a-long-random-value
    ttl-days: 7
  cookie:
    name: buykon_token
    seller-name: buykon_seller_token
    admin-name: buykon_admin_token
    secure: false
    same-site: Lax
  cors:
    origins:
      - http://localhost
      - http://127.0.0.1
      - http://localhost:80
      - http://127.0.0.1:80
      - http://localhost:5500
      - http://127.0.0.1:5500
  google:
    client-id: ${GOOGLE_CLIENT_ID:1049420869484-89qvsir9m5g6rsbso973paccdel74kgq.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
  mail:
    from: ${MAIL_FROM:noreply@buykon.com}
    dev-log-otp: true
  frontend-url: ${FRONTEND_URL:https://buykon.com}
  compreface:
    enabled: ${COMPREFACE_ENABLED:false}
    url: ${COMPREFACE_URL:http://localhost:8000}
    api-key: ${COMPREFACE_API_KEY:}
    similarity-threshold: 0.85

logging:
  level:
    org.springframework.jdbc.core: info
    com.bizdevar: info
